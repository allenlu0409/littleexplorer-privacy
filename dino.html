<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小小探索家 恐龍小圖鑑</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0 0 4rem;
    font-family: "PingFang TC", "Hiragino Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: linear-gradient(180deg, #FFF6E3 0%, #FDE8C8 100%);
    color: #3A3230; min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    padding: .8rem 1rem; background: #FF7043; color: #fff;
    box-shadow: 0 3px 10px rgba(0,0,0,.15);
  }
  header h1 { font-size: 1.25rem; margin: 0; flex: 1 0 auto; white-space: nowrap; }
  .chip {
    border: 0; border-radius: 999px; padding: .45rem .9rem;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    background: #FFD54F; color: #5D4037; box-shadow: 0 2px 0 #C8A63C;
  }
  .chip:active { transform: translateY(2px); box-shadow: none; }
  #stickerCount { background: #fff; color: #E8574B; }
  #grid {
    display: grid; gap: .9rem; padding: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    max-width: 52rem; margin: 0 auto;
  }
  .card {
    border: 0; border-radius: 1.2rem; padding: .8rem .5rem .9rem;
    background: #fff; cursor: pointer; text-align: center;
    box-shadow: 0 4px 0 rgba(0,0,0,.08);
    transition: transform .12s;
  }
  .card:active { transform: scale(.95); }
  .card svg { width: 100%; height: auto; }
  .card .zh { font-size: 1.15rem; font-weight: 800; margin-top: .3rem; }
  .card .en { font-size: .8rem; color: #8A7F76; }
  /* 詳細頁 */
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(58,50,48,.45); display: flex;
    align-items: center; justify-content: center; padding: 1rem;
  }
  #overlay[hidden] { display: none; }
  .sheet {
    background: #FFFDF5; border-radius: 1.6rem; padding: 1.2rem 1.2rem 1.4rem;
    width: 100%; max-width: 26rem; max-height: 92vh; overflow-y: auto;
    text-align: center; position: relative;
    animation: pop .25s ease-out;
  }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .sheet .close {
    position: absolute; top: .7rem; right: .7rem;
    border: 0; background: #EFE5D5; border-radius: 999px;
    width: 2.4rem; height: 2.4rem; font-size: 1.2rem; cursor: pointer;
  }
  .sheet svg { width: min(65%, 15rem); height: auto; }
  .sheet h2 { margin: .2rem 0 0; font-size: 1.6rem; }
  .sheet .en { color: #8A7F76; margin: 0 0 .6rem; }
  .facts { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin: .5rem 0 .8rem; }
  .facts span {
    background: #FFE9B8; border-radius: 999px; padding: .35rem .8rem;
    font-size: .95rem; font-weight: 700; color: #6D4C41;
  }
  .funfact { font-size: 1.05rem; line-height: 1.7; margin: .2rem 0 1rem; }
  .bigbtns { display: flex; gap: .7rem; justify-content: center; flex-wrap: wrap; }
  .bigbtn {
    border: 0; border-radius: 1.1rem; padding: .8rem 1.2rem;
    font-size: 1.15rem; font-weight: 800; cursor: pointer; color: #fff;
  }
  .roarbtn { background: #FF7043; box-shadow: 0 4px 0 #D35835; }
  .saybtn  { background: #4FC3F7; box-shadow: 0 4px 0 #3D9BC7; }
  .sizebtn { background: #66BB6A; box-shadow: 0 4px 0 #4E9852; }
  #sizeBox { margin: .8rem 0 .2rem; }
  #sizeBox .kids { font-size: 1.5rem; line-height: 1.9; word-break: break-all; }
  #sizeBox .kids span { display: inline-block; animation: popin .35s backwards; }
  @keyframes popin { from { transform: scale(0); } to { transform: scale(1); } }
  #sizeBox p { font-size: 1.05rem; font-weight: 700; margin: .4rem 0 0; }
  /* 著色本 */
  .palette { display: flex; flex-wrap: wrap; gap: .55rem; justify-content: center; margin: .8rem 0; }
  .dot {
    width: 2.4rem; height: 2.4rem; border-radius: 50%; border: 3px solid #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,.25); cursor: pointer; padding: 0;
  }
  .dot.sel { outline: 4px solid #3A3230; outline-offset: 2px; transform: scale(1.1); }
  #paintArt svg { width: min(80%, 17rem); }
  #paintArt [fill]:not([fill="none"]) { cursor: pointer; }
  .miniGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
  .miniGrid .card { padding: .4rem; }
  .bigbtn:active { transform: translateY(3px); box-shadow: none; }
  .wiggle { animation: wiggle .5s; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); } 25% { transform: rotate(-4deg) scale(1.05); }
    50% { transform: rotate(3deg) scale(1.05); } 75% { transform: rotate(-2deg); }
  }
  /* 考考你 */
  .quizQ { font-size: 1.35rem; font-weight: 800; margin: .3rem 0 .9rem; }
  .quizOpts { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; }
  .quizOpts .card svg { width: 100%; }
  .quizMsg { min-height: 1.8rem; font-size: 1.15rem; font-weight: 800; margin-top: .8rem; color: #E8574B; }
  .shelf { margin-top: .6rem; font-size: 1.4rem; letter-spacing: .15rem; word-break: break-all; }
  .confetti {
    position: fixed; top: -2rem; z-index: 20; font-size: 1.6rem;
    animation: fall 1.2s linear forwards; pointer-events: none;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(540deg); } }
  footer { text-align: center; font-size: .85rem; color: #8A7F76; padding: 1.5rem 1rem 0; }
  footer a { color: #E8574B; }
  /* 晚安模式 */
  body { transition: background .6s; }
  body.night { background: linear-gradient(180deg, #1A2151 0%, #2C2A4A 100%); color: #EAE6F7; }
  body.night header { background: #3F51B5; }
  body.night .card { background: #3A3E63; box-shadow: 0 4px 0 rgba(0,0,0,.35); }
  body.night .card .zh { color: #EAE6F7; }
  body.night .card .en, body.night footer { color: #B8B3D9; }
  body.night .card svg { opacity: .82; }
  #stars { position: fixed; inset: 0; pointer-events: none; display: none; z-index: 1; }
  body.night #stars { display: block; }
  #stars span { position: absolute; color: #FFF59D; animation: twinkle 2.2s infinite; }
  @keyframes twinkle { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  #grid, footer { position: relative; z-index: 2; }
</style>
</head>

<header>
  <h1>🦕 恐龍小圖鑑</h1>

  <button class="chip" id="eggBtn">🥚 驚喜蛋</button>

<div id="stars" aria-hidden="true"></div>
<main id="grid"></main>

<div id="overlay" hidden><div class="sheet" id="sheet"></div></div>

<footer>
  <p>所有叫聲都在裝置上即時合成,不需網路、不收集任何資料。<br>

/* ---------- 叫聲合成(Web Audio) ---------- */
let actx = null;
function audio(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if(actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(c, o){
  const t = c.currentTime + (o.at || 0);
  const dur = o.dur || 0.5;
  const osc = c.createOscillator();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.f0 || 200, t);
  if(o.f1) osc.frequency.exponentialRampToValueAtTime(o.f1, t + dur);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol || 0.22, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  let head = osc;
  if(o.lp){
    const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp;
    osc.connect(f); head = f;
  }
  head.connect(g); g.connect(c.destination);
  if(o.vibF){
    const l = c.createOscillator(); l.frequency.value = o.vibF;
    const lg = c.createGain(); lg.gain.value = o.vibD || 20;
    l.connect(lg); lg.connect(osc.frequency);
    l.start(t); l.stop(t + dur + 0.1);
  }
  osc.start(t); osc.stop(t + dur + 0.1);
}
function hiss(c, o){
  const t = c.currentTime + (o.at || 0);
  const dur = o.dur || 0.4;
  const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = c.createBufferSource(); src.buffer = buf;
  const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp || 600;
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol || 0.12, t + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(c.destination);
  src.start(t);
}
function roar(kind){
  if(night){ snore(); return; } // 晚安模式:大家都睡著了,只會打呼
  const c = audio();
  switch(kind){
    case 'trex': // 低沉怒吼
      tone(c, {type:'sawtooth', f0:95, f1:50, dur:1.3, vol:0.3, lp:420, vibF:22, vibD:14});
      tone(c, {type:'sawtooth', f0:140, f1:70, dur:1.1, vol:0.14, lp:500});
      hiss(c, {dur:1.0, lp:350, vol:0.1});
      break;
    case 'tricera': // 兩聲低鳴喇叭
      tone(c, {type:'triangle', f0:170, f1:120, dur:0.5, vol:0.28, lp:900});
      tone(c, {type:'triangle', f0:190, f1:130, dur:0.6, at:0.55, vol:0.28, lp:900});
      break;
    case 'brachio': // 悠長低沉的鳴叫
      tone(c, {type:'sine', f0:75, dur:1.6, vol:0.32, vibF:4, vibD:6});
      tone(c, {type:'triangle', f0:150, f1:110, dur:1.4, vol:0.1, lp:600});
      break;
    case 'stego': // 三聲短短的咕嚕
      for(let i = 0; i < 3; i++)
        tone(c, {type:'sawtooth', f0:110, f1:85, dur:0.22, at:i*0.3, vol:0.24, lp:320});
      break;
    case 'ptero': // 高亢尖叫
      tone(c, {type:'sawtooth', f0:750, f1:1500, dur:0.35, vol:0.13});
      tone(c, {type:'sawtooth', f0:1500, f1:600, dur:0.4, at:0.35, vol:0.13});
      break;
    case 'raptor': // 連續啾啾叫
      for(let i = 0; i < 4; i++)
        tone(c, {type:'square', f0:1000, f1:1700, dur:0.12, at:i*0.18, vol:0.08});
      break;
    case 'anky': // 咚!(鎚子)+ 咕嚕
      tone(c, {type:'sine', f0:60, f1:35, dur:0.35, vol:0.4});
      hiss(c, {dur:0.15, lp:200, vol:0.2});
      tone(c, {type:'sawtooth', f0:100, f1:80, dur:0.4, at:0.45, vol:0.22, lp:300});
      break;
    case 'plesio': // 水裡的咕嚕轉音
      tone(c, {type:'sine', f0:300, dur:1.1, vol:0.2, vibF:7, vibD:60});
      tone(c, {type:'sine', f0:450, dur:0.9, at:0.2, vol:0.1, vibF:9, vibD:80});
      break;
    case 'parasaur': // 叭——叭——小喇叭
      tone(c, {type:'triangle', f0:220, f1:330, dur:0.55, vol:0.26, vibF:5, vibD:8});
      tone(c, {type:'triangle', f0:440, f1:660, dur:0.55, vol:0.1});
      tone(c, {type:'triangle', f0:330, f1:262, dur:0.7, at:0.65, vol:0.26, vibF:5, vibD:8});
      tone(c, {type:'triangle', f0:660, f1:524, dur:0.7, at:0.65, vol:0.1});
      break;
    case 'spino': // 水邊的低吼
      tone(c, {type:'sawtooth', f0:120, f1:65, dur:1.2, vol:0.28, lp:450, vibF:9, vibD:30});
      hiss(c, {dur:1.0, lp:500, vol:0.1});
      break;
    case 'diplo': // 啪!甩尾巴 + 低鳴
      hiss(c, {dur:0.1, lp:4000, vol:0.3});
      tone(c, {type:'sine', f0:65, dur:1.3, at:0.25, vol:0.3, vibF:3, vibD:5});
      break;
    case 'archaeo': // 啾啾鳥叫
      for(let i = 0; i < 4; i++)
        tone(c, {type:'sine', f0:1800, f1:2500, dur:0.1, at:i*0.16, vol:0.09});
      break;
  }
}

}

function knock(){
  const c = audio();
  tone(c, {type:'sine', f0:220, f1:150, dur:0.12, vol:0.3});
}
function startEgg(){
  let taps = 0;
  sheet.innerHTML =
    '<button class="close" aria-label="關閉">✕</button>' +
    '<div class="quizQ">咚咚咚…裡面是誰呀?<br>點蛋 3 下,把牠孵出來!</div>' +
    '<div id="eggBox" style="cursor:pointer">' + eggSvg(0) + '</div>' +
    '<div class="quizMsg" id="eggMsg">👆 點我!</div>';
  sheet.querySelector('.close').addEventListener('click', closeSheet);
  say('咚咚咚,裡面是誰呀?點蛋三下,把牠孵出來!');
  const box = sheet.querySelector('#eggBox');
  box.addEventListener('click', () => {
    taps++;
    knock();
    if(taps < 3){
      box.innerHTML = eggSvg(taps);
      box.classList.remove('wiggle'); void box.offsetWidth; box.classList.add('wiggle');
      document.getElementById('eggMsg').textContent = taps === 1 ? '有聲音!再點!' : '殼裂開了!最後一下!';
    } else {
      const d = DINOS[Math.floor(Math.random() * DINOS.length)];
      sheet.innerHTML =
        '<button class="close" aria-label="關閉">✕</button>' +
        '<div class="quizQ">🎉 孵出來了!</div>' +
        '<div class="wiggle" style="width:min(60%,13rem);margin:0 auto">' + d.svg + '</div>' +
        '<h2>' + d.zh + '寶寶</h2><p class="en">Baby ' + d.en + '</p>' +
        '<p class="funfact">' + d.fact + '</p>' +
        '<div class="bigbtns">' +
          '<button class="bigbtn roarbtn">🔊 聽叫聲</button>' +
          '<button class="bigbtn saybtn">🥚 再孵一顆</button>' +
        '</div>';
      sheet.querySelector('.close').addEventListener('click', closeSheet);
      sheet.querySelector('.roarbtn').addEventListener('click', () => roar(d.id));
      sheet.querySelector('.saybtn').addEventListener('click', startEgg);
      roar(d.id);
      say('孵出來了!是' + d.zh + '寶寶!');
      addSticker('🥚');
      confetti();
    }
  });
  overlay.hidden = false;
}

function pickSticker(){
  const s = ['🦖','🦕','🌋','🥚','🌿','⭐','🌈','🍖'];
  return s[Math.floor(Math.random() * s.length)];
}
function confetti(){
  const s = ['🎉','⭐','🦕','🦖','✨'];
  for(let i = 0; i < 14; i++){
    const e = document.createElement('span');
    e.className = 'confetti';
    e.textContent = s[Math.floor(Math.random() * s.length)];
    e.style.left = Math.random() * 100 + 'vw';
    e.style.animationDelay = (Math.random() * 0.4) + 's';
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 1800);
  }
}

renderStickerCount();
</script>
